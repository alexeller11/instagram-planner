<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Agency</title>

<style>
body{margin:0;font-family:Arial;background:#02030f;color:#fff}
.layout{display:flex}
.sidebar{width:250px;background:#06051a;padding:20px}
.menu div{margin:10px 0;padding:10px;cursor:pointer}
.main{flex:1;padding:30px}
.card{background:#0c0b24;padding:12px;margin:10px 0;border-radius:10px}
button{margin:5px;padding:8px;background:#ff6b35;color:#fff;border:0}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>Agency</h2>
  <div class="menu">
    <div onclick="load('dashboard')">Dashboard</div>
    <div onclick="load('diagnostico')">Diagnóstico</div>
    <div onclick="load('plano')">Plano</div>
    <div onclick="load('concorrencia')">Concorrência</div>
  </div>
</div>

<div class="main">
  <select id="acc"></select>
  <div id="out"></div>
</div>

</div>

<script>

let accounts=[],selected,posts=[];

async function init(){
  const r=await fetch("/api/me");
  const d=await r.json();

  accounts=d.accounts;
  selected=accounts[0];

  const sel=document.getElementById("acc");

  accounts.forEach(a=>{
    const o=document.createElement("option");
    o.value=a.id;
    o.innerText=a.username;
    sel.appendChild(o);
  });

  sel.onchange=()=>selected=accounts.find(a=>a.id==sel.value);

  load("dashboard");
}
init();

function post(url,extra={}){
  return fetch(url,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ igId:selected.id,...extra })
  }).then(r=>r.json());
}

async function load(tab){

  if(tab==="dashboard"){
    const d=await post("/api/dashboard");
    out(`
      <h2>Bio</h2>${d.bio.map(c).join("")}
      <h2>Melhorias</h2>${d.melhorias.map(c).join("")}
      <h2>Posicionamento</h2>${c(d.posicionamento)}
    `);
  }

  if(tab==="diagnostico"){
    const d=await post("/api/diagnostico");
    out(`
      <h2>Problemas</h2>${d.problemas.map(c).join("")}
      <h2>Oportunidades</h2>${d.oportunidades.map(c).join("")}
      <h2>Ações</h2>${d.acoes_14_dias.map(c).join("")}
    `);
  }

  if(tab==="plano"){
    const d=await post("/api/plano",{goal:"Autoridade"});
    posts=d.posts;

    out(`
      ${posts.map((p,i)=>`
        <div class="card">
          <b>${p.format}</b>
          <h3>${p.theme}</h3>
          <p><b>Hook:</b> ${p.hook}</p>
          <p>${p.script_or_slides.join("<br>")}</p>
          <p>${p.caption}</p>
          <button onclick="copy(${i})">Copiar</button>
        </div>
      `).join("")}
    `);
  }

  if(tab==="concorrencia"){
    const d=await post("/api/concorrencia",{city:"Linhares"});
    out(`
      <h2>Concorrentes</h2>
      ${d.concorrentes.map(x=>c(x.nome+" - "+x.perfil)).join("")}
      <h2>Plano</h2>
      ${d.plano_para_ganhar.map(c).join("")}
    `);
  }
}

function copy(i){
  navigator.clipboard.writeText(posts[i].caption);
  alert("Copiado");
}

function c(t){ return `<div class="card">${t}</div>` }
function out(h){ document.getElementById("out").innerHTML=h }

</script>

</body>
</html>
