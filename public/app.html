<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Agency Planner Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg: #fcfcfd; --sidebar: #09090b; --brand: #006fee; --text: #18181b; --border: #e4e4e7; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--bg); color: var(--text); display: flex; }
    
    aside { width: 260px; background: var(--sidebar); color: white; height: 100vh; position: fixed; padding: 24px; display: flex; flex-direction: column; }
    .nav-item { padding: 12px; border-radius: 8px; cursor: pointer; color: #a1a1aa; margin-bottom: 4px; transition: 0.2s; }
    .nav-item.active { background: #27272a; color: white; }
    
    main { margin-left: 260px; flex: 1; padding: 40px; }
    .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
    
    .btn { background: var(--brand); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }
    .page { display: none; } .page.active { display: block; }
    .post-card { border-left: 4px solid var(--brand); padding-left: 16px; margin-bottom: 20px; }
    input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; }
  </style>
</head>
<body>

<aside>
  <h2 style="margin-bottom: 32px;">✦ Agency Pro</h2>
  <div class="nav-item active" onclick="show('dashboard')">Dashboard</div>
  <div class="nav-item" onclick="show('intel')">Inteligência</div>
  <div class="nav-item" onclick="show('spy')">Spy Tool (Concorrentes)</div>
  <div class="nav-item" onclick="show('planner')">Planejador</div>
  <div class="nav-item" style="margin-top: auto;" onclick="logout()">Sair</div>
</aside>

<main>
  <div id="dashboard" class="page active">
    <div style="display:flex; justify-content:space-between; margin-bottom:24px;">
      <h2>Dashboard do Cliente</h2>
      <div id="acc-selector" style="display:flex; gap:8px;"></div>
    </div>
    
    <div class="grid-3">
      <div class="card"><h4>Seguidores</h4><p id="d-followers" style="font-size:24px; font-weight:700;">-</p></div>
      <div class="card"><h4>Engajamento Real</h4><p id="d-er" style="font-size:24px; font-weight:700; color:var(--brand);">-</p></div>
      <div class="card"><h4>Média de Likes</h4><p id="d-likes" style="font-size:24px; font-weight:700;">-</p></div>
    </div>
    
    <div class="card"><canvas id="erChart" height="100"></canvas></div>
  </div>

  <div id="intel" class="page">
    <div class="card">
      <h3>Diagnóstico Estratégico IA</h3>
      <input id="i-niche" placeholder="Nicho (Ex: Advocacia)">
      <input id="i-audience" placeholder="Público (Ex: Empresários)">
      <button class="btn" onclick="getIntel()">Gerar Análise Profunda</button>
    </div>
    <div id="intel-result" class="card" style="display:none;"></div>
  </div>

  <div id="spy" class="page">
    <div class="card">
      <h3>Spy Tool: Analisar Concorrente</h3>
      <input id="s-username" placeholder="@username_do_concorrente">
      <button class="btn" onclick="spy()">Capturar e Analisar</button>
    </div>
    <div id="spy-result" class="card" style="display:none;">
      <img id="spy-img" style="width:100%; border-radius:8px; margin-bottom:16px;">
      <div id="spy-text"></div>
    </div>
  </div>

  <div id="planner" class="page">
    <div class="card">
      <h3>Planejador 30 Dias</h3>
      <div class="grid-3">
        <div><label>Reels</label><input type="number" id="p-reels" value="12"></div>
        <div><label>Carrossel</label><input type="number" id="p-car" value="8"></div>
        <div><label>Foto</label><input type="number" id="p-img" value="10"></div>
      </div>
      <button class="btn" onclick="genPlan()">Gerar Cronograma Completo</button>
    </div>
    <div id="plan-result"></div>
    <button id="btn-pdf" class="btn" style="display:none; margin-top:16px;" onclick="exportPDF()">Baixar PDF da Estratégia</button>
  </div>
</main>

<script>
let accounts = [], selAcc = null, currentPlan = null;

async function init() {
  const r = await fetch('/api/me');
  const d = await r.json();
  if(!d.logged) location.href = '/';
  accounts = d.accounts;
  const container = document.getElementById('acc-selector');
  accounts.forEach(a => {
    const btn = document.createElement('button');
    btn.textContent = `@${a.username}`;
    btn.onclick = () => select(a);
    container.appendChild(btn);
  });
  if(accounts.length) select(accounts[0]);
}

async function select(acc) {
  selAcc = acc;
  document.getElementById('d-followers').textContent = acc.followers_count;
  const r = await fetch(`/api/dashboard/${acc.id}`);
  const data = await r.json();
  document.getElementById('d-er').textContent = data.metrics.engagement_rate + '%';
  document.getElementById('d-likes').textContent = data.metrics.avg_likes;
  renderChart(data.recent_posts);
}

function renderChart(posts) {
  const ctx = document.getElementById('erChart');
  if(window.chart) window.chart.destroy();
  window.chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: posts.map((_,i) => `Post ${i+1}`).reverse(),
      datasets: [{ label: 'Curtidas Reais', data: posts.map(p => p.like_count).reverse(), borderColor: '#006fee', tension: 0.3 }]
    }
  });
}

async function getIntel() {
  const res = await fetch('/api/intelligence', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ igId: selAcc.id, niche: document.getElementById('i-niche').value, audience: document.getElementById('i-audience').value })
  });
  const data = await res.json();
  const div = document.getElementById('intel-result');
  div.style.display = 'block';
  div.innerHTML = `<h4>Resumo Executivo</h4><p>${data.executive_summary}</p><h4>Sugestões de Bio</h4><ul>${data.bio_suggestions.map(b => `<li>${b}</li>`).join('')}</ul>`;
}

async function spy() {
  const user = document.getElementById('s-username').value;
  const res = await fetch('/api/competitors', { 
    method: 'POST', headers: {'Content-Type':'application/json'}, 
    body: JSON.stringify({ username: user }) 
  });
  const data = await res.json();
  document.getElementById('spy-result').style.display = 'block';
  document.getElementById('spy-img').src = data.screenshot;
}

async function genPlan() {
  const res = await fetch('/api/generate', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ 
      igId: selAcc.id, reels: document.getElementById('p-reels').value, 
      carousels: document.getElementById('p-car').value, singlePosts: document.getElementById('p-img').value 
    })
  });
  currentPlan = await res.json();
  const div = document.getElementById('plan-result');
  div.innerHTML = currentPlan.posts.map(p => `
    <div class="card post-card">
      <strong>DIA ${p.n} - ${p.format}</strong>
      <h4>${p.title}</h4>
      <p><strong>Hook:</strong> ${p.hook}</p>
      <p style="white-space:pre-wrap; color:#52525b; margin-top:8px;">${p.copy}</p>
    </div>
  `).join('');
  document.getElementById('btn-pdf').style.display = 'block';
}

async function exportPDF() {
  const res = await fetch('/api/export-report', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ payload: currentPlan, username: selAcc.username })
  });
  const blob = await res.blob();
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = `estrategia_${selAcc.username}.pdf`; a.click();
}

function show(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
}

init();
</script>
</body>
</html>
