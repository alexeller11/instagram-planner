<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Social Planner Pro v4</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--brand:#ff6b35;--brand2:#ffd166;--bg:#0c0a1a;--surface:#13112a;--card:#1c1a35;--border:rgba(255,255,255,.08);--text:#fff;--muted:rgba(255,255,255,.55);--subtle:rgba(255,255,255,.25)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:.5px solid var(--border);padding:.8rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:800;background:linear-gradient(90deg,#ff6b35,#ffd166);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.v-badge{background:rgba(255,107,53,.2);border:.5px solid rgba(255,107,53,.4);border-radius:20px;padding:2px 10px;font-size:10px;color:#ffb38a}
.acc-chip{background:rgba(255,255,255,.05);border:.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.acc-chip.on{background:rgba(255,107,53,.15);border-color:rgba(255,107,53,.5)}
.btn-out{font-size:11px;color:var(--muted);background:none;border:.5px solid var(--border);padding:4px 10px;border-radius:8px;cursor:pointer}
.page{padding:1.25rem;max-width:960px;margin:0 auto}
.card{background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px}

/* MANUAL TOKEN BOX */
.manual-box{background:rgba(255,107,53,.08);border:.5px solid rgba(255,107,53,.2);border-radius:12px;padding:1rem;margin-bottom:1rem}
.manual-title{font-size:12px;font-weight:700;color:var(--brand);margin-bottom:.5rem;display:flex;align-items:center;gap:6px}
.manual-input-wrap{display:flex;gap:8px}
.manual-input-wrap input{flex:1;font-size:11px;padding:8px 12px;background:rgba(255,255,255,.05);border:.5px solid var(--border);border-radius:8px;color:#fff;outline:none}
.btn-test{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:0 15px;font-size:11px;font-weight:600;cursor:pointer}

.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.75rem;margin-bottom:1rem}
.metric-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;padding:.9rem;text-align:center}
.metric-card .mv{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700}
.metric-card .ml{font-size:11px;color:var(--muted);margin-top:3px}
select{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;background:rgba(255,255,255,.05);border:.5px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);outline:none}
.gen-btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b35,#f7931e);color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="logo">✦ Social Planner Pro</div>
    <div class="v-badge">v4.1 AI</div>
  </div>
  <div id="acc-list" style="display:flex;gap:8px;overflow-x:auto"></div>
  <button class="btn-out" onclick="location.href='/'">Sair</button>
</header>

<main class="page">
  <!-- CONECTAR MANUALMENTE -->
  <div class="manual-box">
    <div class="manual-title">📸 Conectar Nova Conta do Instagram</div>
    <div class="manual-input-wrap">
      <input type="text" id="manual-token" placeholder="Cole seu Token de Acesso da Meta aqui...">
      <button class="btn-test" id="btn-test-token">Conectar</button>
    </div>
    <div id="diag-msg" style="font-size:10px;color:var(--muted);margin-top:8px">Seus tokens configurados no Railway serão carregados automaticamente.</div>
  </div>

  <div id="main-content">
    <div class="card">
      <div class="card-title">📊 Visão Geral do Perfil</div>
      <div class="metrics-grid" id="metrics">
        <div class="metric-card"><div class="mv">-</div><div class="ml">Seguidores</div></div>
        <div class="metric-card"><div class="mv">-</div><div class="ml">Posts</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🚀 Gerar Novo Plano</div>
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div>
          <label style="font-size:11px;color:var(--muted)">Objetivo do Mês</label>
          <select id="goal">
            <option value="Vendas">Vendas e Conversão</option>
            <option value="Engajamento">Engajamento e Comunidade</option>
            <option value="Crescimento">Crescimento de Seguidores</option>
          </select>
        </div>
        <button class="gen-btn" id="btn-gen">Gerar Plano Estratégico com GPT-4o</button>
      </div>
    </div>
  </div>
</main>

<script>
let accounts = [];
let currentAccount = null;

async function init() {
  const res = await fetch('/api/me');
  const data = await res.json();
  if (!data.logged) return location.href = '/';
  accounts = data.accounts || [];
  renderAccounts();
}

function renderAccounts() {
  const list = document.getElementById('acc-list');
  if (accounts.length === 0) {
    list.innerHTML = '<span style="font-size:11px;color:#f09595">Nenhuma conta encontrada. Use o campo acima para conectar.</span>';
    return;
  }
  list.innerHTML = accounts.map(acc => `
    <div class="acc-chip ${currentAccount?.id === acc.id ? 'on' : ''}" onclick="selectAcc('${acc.id}')">
      @${acc.username}
    </div>
  `).join('');
  if (!currentAccount && accounts.length > 0) selectAcc(accounts[0].id);
}

function selectAcc(id) {
  currentAccount = accounts.find(a => a.id === id);
  renderAccounts();
  updateMetrics();
}

function updateMetrics() {
  if (!currentAccount) return;
  const metrics = document.getElementById('metrics');
  metrics.innerHTML = `
    <div class="metric-card"><div class="mv">${currentAccount.followers_count || 0}</div><div class="ml">Seguidores</div></div>
    <div class="metric-card"><div class="mv">${currentAccount.media_count || 0}</div><div class="ml">Posts</div></div>
  `;
}

document.getElementById('btn-test-token').addEventListener('click', async () => {
  const token = document.getElementById('manual-token').value;
  if (!token) return alert('Cole um token primeiro!');
  const btn = document.getElementById('btn-test-token');
  const msg = document.getElementById('diag-msg');
  btn.disabled = true;
  btn.textContent = 'Conectando...';
  try {
    const res = await fetch('/api/test-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await res.json();
    if (data.success) {
      msg.innerHTML = '<span style="color:#639922">✓ Conta @' + data.accounts[0].username + ' conectada com sucesso!</span>';
      data.accounts.forEach(acc => {
        if (!accounts.find(a => a.id === acc.id)) accounts.push(acc);
      });
      renderAccounts();
      document.getElementById('manual-token').value = '';
    } else {
      msg.innerHTML = '<span style="color:#f09595">✗ Erro: ' + data.error + '</span>';
    }
  } catch (e) {
    msg.innerHTML = '<span style="color:#f09595">✗ Erro de conexão com o servidor.</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Conectar';
  }
});

init();
</script>
</body>
</html>
