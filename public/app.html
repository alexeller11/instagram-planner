<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Planner</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02030f;
  color:#fff;
}

/* ===== LAYOUT ===== */
.container{
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  background:#06051a;
  height:100vh;
  padding:25px;
  border-right:1px solid rgba(255,255,255,.05);
}

.sidebar h2{
  font-size:16px;
  margin-bottom:20px;
}

.menu span{
  display:block;
  margin:10px 0;
  color:#888;
  cursor:pointer;
}

.menu span.active{
  background:#1bd1b3;
  color:#000;
  padding:10px;
  border-radius:10px;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:30px;
}

/* ===== TOPO CONTAS ===== */
.accounts{
  display:flex;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.account{
  padding:8px 14px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.1);
  cursor:pointer;
  font-size:13px;
}

.account.active{
  border-color:#1bd1b3;
  color:#1bd1b3;
}

/* ===== CARDS ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:30px;
}

.card{
  background:#0c0b24;
  padding:20px;
  border-radius:14px;
}

.card small{
  color:#888;
}

.card h3{
  margin:10px 0 0;
}

/* ===== TITULOS ===== */
.section-title{
  margin:20px 0 10px;
  font-size:18px;
}

/* ===== GRID POSTS ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:15px;
}

.post{
  background:#0c0b24;
  padding:15px;
  border-radius:14px;
}

.tag{
  font-size:11px;
  color:#1bd1b3;
}

.post-title{
  margin:5px 0;
  font-weight:bold;
}

.small{
  font-size:13px;
  color:#888;
}

/* ===== BOTÃO ===== */
button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ff6b35;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Dashboard 360</h2>

  <div class="menu">
    <span class="active">Dashboard 360</span>
    <span>Diagnóstico</span>
    <span>Plano</span>
    <span>Calendário</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- CONTAS -->
<div class="accounts" id="accounts"></div>

<!-- DASHBOARD -->
<div class="cards">
  <div class="card"><small>Seguidores</small><h3>--</h3></div>
  <div class="card"><small>Alcance</small><h3>--</h3></div>
  <div class="card"><small>Impressões</small><h3>--</h3></div>
  <div class="card"><small>Engajamento</small><h3>--</h3></div>
</div>

<button onclick="genPlan()">Gerar Plano</button>

<!-- POSTS -->
<div class="section-title">Posts</div>
<div id="posts" class="grid"></div>

<!-- CALENDÁRIO -->
<div class="section-title">Calendário</div>
<div id="calendar" class="grid"></div>

</div>
</div>

<script>

let accounts = [];
let selectedAccount = null;
let lastPlan = [];

/* ===== INIT ===== */
async function init(){
  const res = await fetch("/api/me");
  const data = await res.json();

  accounts = data.accounts || [];
  selectedAccount = accounts[0];

  renderAccounts();
}

init();

/* ===== CONTAS ===== */
function renderAccounts(){
  const el = document.getElementById("accounts");
  el.innerHTML = "";

  accounts.forEach(a=>{
    const div = document.createElement("div");
    div.className = "account" + (a.id === selectedAccount.id ? " active" : "");
    div.innerText = "@" + a.username;

    div.onclick = ()=>{
      selectedAccount = a;
      renderAccounts();
    };

    el.appendChild(div);
  });
}

/* ===== GERAR ===== */
async function genPlan(){

  document.getElementById("posts").innerHTML = "Gerando...";

  const res = await fetch("/api/generate",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      igId: selectedAccount.id,
      goal: "Crescimento",
      tone: "Profissional"
    })
  });

  const data = await res.json();

  lastPlan = data.posts || [];

  renderPosts(lastPlan);
  renderCalendar(lastPlan);
}

/* ===== POSTS ===== */
function renderPosts(posts){

  const el = document.getElementById("posts");
  el.innerHTML = "";

  posts.forEach(p=>{
    el.innerHTML += `
      <div class="post">
        <div class="tag">${p.format}</div>
        <div class="post-title">${p.theme}</div>
        <div class="small">${(p.caption||"").substring(0,100)}...</div>
      </div>
    `;
  });
}

/* ===== CALENDÁRIO ===== */
function renderCalendar(posts){

  const el = document.getElementById("calendar");
  el.innerHTML = "";

  posts.forEach(p=>{
    el.innerHTML += `
      <div class="post">
        <div class="tag">${p.format}</div>
        <div>${p.theme}</div>
      </div>
    `;
  });
}

</script>

</body>
</html>
