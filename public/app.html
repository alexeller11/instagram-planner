<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Planner</title>

<style>
:root{
  --bg:#050414;
  --card:#0f0c2a;
  --accent:#2bd1b4;
  --text:#fff;
  --muted:#7c7a9a;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* LAYOUT */
.layout{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#07061c;
  height:100vh;
  padding:25px;
  border-right:1px solid rgba(255,255,255,.05);
}

.sidebar h1{
  font-size:18px;
  margin-bottom:30px;
}

.menu div{
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  color:var(--muted);
  cursor:pointer;
}

.menu div:hover{
  background:var(--card);
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* TOPBAR */
.topbar{
  display:flex;
  gap:10px;
  margin-bottom:25px;
}

select,button{
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  background:var(--accent);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-bottom:30px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
}

.card h3{
  font-size:13px;
  color:var(--muted);
}

.card p{
  font-size:24px;
  margin:5px 0 0;
}

/* POSTS GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:15px;
}

.post{
  background:var(--card);
  padding:15px;
  border-radius:14px;
}

.tag{
  font-size:11px;
  color:var(--accent);
}

.title{
  font-weight:bold;
  margin-top:6px;
}

.small{
  font-size:13px;
  color:var(--muted);
}

/* CALENDAR */
.calendar{
  margin-top:30px;
}
</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h1>Planner</h1>

  <div class="menu">
    <div>Dashboard</div>
    <div>Plano</div>
    <div>Calendário</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<h2>Saúde da Conta</h2>

<div class="cards">
  <div class="card"><h3>Seguidores</h3><p>--</p></div>
  <div class="card"><h3>Alcance</h3><p>--</p></div>
  <div class="card"><h3>Impressões</h3><p>--</p></div>
  <div class="card"><h3>Engajamento</h3><p>--</p></div>
</div>

<div class="topbar">
  <select id="account"></select>
  <select id="goal">
    <option>Crescimento</option>
    <option>Vendas</option>
  </select>
  <select id="tone">
    <option>Profissional</option>
    <option>Autoridade</option>
  </select>

  <button onclick="genPlan()">Gerar Plano</button>
</div>

<h2>Posts</h2>
<div id="posts" class="grid"></div>

<h2 class="calendar">Calendário</h2>
<div id="calendar" class="grid"></div>

</div>
</div>

<script>

let accounts = [];
let lastPlan = [];

async function init(){
  const res = await fetch("/api/me");
  const data = await res.json();

  accounts = data.accounts || [];

  const sel = document.getElementById("account");

  accounts.forEach(a=>{
    const opt = document.createElement("option");
    opt.value = a.id;
    opt.innerText = a.username;
    sel.appendChild(opt);
  });
}

init();

async function genPlan(){

  const igId = document.getElementById("account").value;
  const goal = document.getElementById("goal").value;
  const tone = document.getElementById("tone").value;

  document.getElementById("posts").innerHTML = "Gerando...";

  const res = await fetch("/api/generate",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ igId, goal, tone })
  });

  const data = await res.json();

  lastPlan = data.posts || [];

  renderPosts(lastPlan);
  renderCalendar(lastPlan);
}

function renderPosts(posts){
  const el = document.getElementById("posts");
  el.innerHTML = "";

  posts.forEach(p=>{
    el.innerHTML += `
      <div class="post">
        <div class="tag">${p.format}</div>
        <div class="title">${p.theme}</div>
        <p class="small">${(p.caption||"").substring(0,100)}...</p>
      </div>
    `;
  });
}

function renderCalendar(posts){
  const el = document.getElementById("calendar");
  el.innerHTML = "";

  posts.forEach(p=>{
    el.innerHTML += `
      <div class="post">
        <div class="tag">${p.format}</div>
        <div>${p.theme}</div>
      </div>
    `;
  });
}

</script>

</body>
</html>
