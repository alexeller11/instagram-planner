<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Planner Agency</title>
  <style>
    body{margin:0;background:#0c0a1a;color:#fff;font-family:Arial,sans-serif}
    header{padding:16px 20px;background:#17142d;display:flex;justify-content:space-between;align-items:center}
    main{padding:20px;max-width:1100px;margin:0 auto}
    .card{background:#17142d;border-radius:16px;padding:18px;margin-bottom:16px}
    textarea,input{width:100%;padding:12px;border-radius:10px;border:0;margin-top:8px;background:#26223f;color:#fff}
    button{padding:12px 16px;border:0;border-radius:10px;background:#ff6b35;color:#fff;font-weight:700;cursor:pointer;margin-top:12px}
    .list{display:grid;gap:12px;margin-top:16px}
    pre{white-space:pre-wrap;line-height:1.6}
  </style>
</head>
<body>
  <header>
    <strong>Instagram Planner Agency</strong>
    <a href="/" style="color:#fff">Sair</a>
  </header>

  <main>
    <div class="card">
      <h2>Status</h2>
      <button onclick="loadStatus()">Atualizar status</button>
      <pre id="statusBox"></pre>
    </div>

    <div class="card">
      <h2>Concorrência</h2>
      <input id="niche" placeholder="Nicho">
      <input id="location" placeholder="Cidade">
      <textarea id="competitors" rows="6" placeholder="@concorrente1&#10;@concorrente2"></textarea>
      <button onclick="runCompetitors()">Analisar</button>
      <div class="list" id="result"></div>
    </div>
  </main>

  <script>
    let accounts = [];

    async function init(){
      const me = await fetch("/api/me", { credentials:"include" }).then(r => r.json());
      if(!me.logged){
        window.location.href = "/";
        return;
      }
      accounts = me.accounts || [];
      loadStatus();
    }

    async function loadStatus(){
      const data = await fetch("/api/status", { credentials:"include" }).then(r => r.json());
      document.getElementById("statusBox").textContent = JSON.stringify(data, null, 2);
    }

    async function runCompetitors(){
      const current = accounts[0];
      const competitors = document.getElementById("competitors").value
        .split("\n")
        .map(v => v.trim())
        .filter(Boolean);

      const payload = {
        igId: current?.id,
        niche: document.getElementById("niche").value,
        audience: "",
        competitors,
        location: document.getElementById("location").value,
        goal: "",
        tone: "",
        extra: ""
      };

      const res = await fetch("/api/competitors", {
        method:"POST",
        credentials:"include",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      const box = document.getElementById("result");

      box.innerHTML = (data.competitors_analysis || []).map(c => `
        <div class="card">
          <h3>${c.username || ""}</h3>
          <div><strong>Score:</strong> ${c.score || 0}</div>
          <div><strong>Ameaça:</strong> ${c.threat_level || "-"}</div>
          <div><strong>Confiança:</strong> ${c.data_confidence || "-"}</div>
          <div><strong>Evidência:</strong> ${c.evidence_summary || "-"}</div>
          <pre>${c.opportunity_against || ""}</pre>
        </div>
      `).join("");
    }

    init();
  </script>
</body>
</html>
