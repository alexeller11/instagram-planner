<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Agency</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02030f;
  color:#fff;
}

.layout{ display:flex; }

.sidebar{
  width:260px;
  background:#06051a;
  height:100vh;
  padding:25px;
}

.menu div{
  margin:10px 0;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  color:#aaa;
}

.menu div.active{
  background:#1bd1b3;
  color:#000;
}

.main{
  flex:1;
  padding:30px;
}

.top{
  margin-bottom:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff6b35;
  color:#fff;
  cursor:pointer;
}

.card{
  background:#0c0b24;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:10px;
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>Planner</h2>

  <div class="menu">
    <div onclick="openTab('dashboard')" id="tab-dashboard">Dashboard</div>
    <div onclick="openTab('diagnostico')" id="tab-diagnostico">Diagnóstico</div>
    <div onclick="openTab('plano')" id="tab-plano">Plano</div>
    <div onclick="openTab('concorrencia')" id="tab-concorrencia">Concorrência</div>
  </div>
</div>

<div class="main">

<div class="top">
  <select id="account"></select>
</div>

<div id="content"></div>

</div>
</div>

<script>

// ===== INIT =====
let accounts = [];
let selected = null;

async function init(){
  const res = await fetch("/api/me");
  const data = await res.json();

  accounts = data.accounts;
  selected = accounts[0];

  const sel = document.getElementById("account");

  accounts.forEach(a=>{
    const opt = document.createElement("option");
    opt.value = a.id;
    opt.innerText = a.username;
    sel.appendChild(opt);
  });

  sel.onchange = ()=>{
    selected = accounts.find(a=>a.id===sel.value);
  }

  openTab("dashboard");
}

init();

// ===== NAV =====
function openTab(tab){

  document.querySelectorAll(".menu div").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");

  if(tab==="dashboard") loadDashboard();
  if(tab==="diagnostico") loadDiagnostico();
  if(tab==="plano") loadPlano();
  if(tab==="concorrencia") loadConcorrencia();
}

// ===== DASHBOARD =====
async function loadDashboard(){

  setLoading();

  const data = await post("/api/dashboard");

  render(`
    <h2>Bio</h2>
    ${data.bio.map(b=>card(b)).join("")}

    <h2>Melhorias</h2>
    ${data.melhorias.map(m=>card(m)).join("")}

    <h2>Posicionamento</h2>
    ${card(data.posicionamento)}
  `);
}

// ===== DIAGNOSTICO =====
async function loadDiagnostico(){

  setLoading();

  const data = await post("/api/diagnostico");

  render(`
    <h2>Problemas</h2>
    ${data.problemas.map(card).join("")}

    <h2>Oportunidades</h2>
    ${data.oportunidades.map(card).join("")}

    <h2>Ações (14 dias)</h2>
    ${data.acoes_14_dias.map(card).join("")}
  `);
}

// ===== PLANO =====
function loadPlano(){

  render(`
    <button onclick="gerarPlano()">Gerar Plano</button>
    <div id="plano"></div>
  `);
}

async function gerarPlano(){

  document.getElementById("plano").innerHTML = "Gerando...";

  const data = await post("/api/plano", {
    goal:"Autoridade",
    mix:{ reels:14, carrosseis:10, estaticos:6 }
  });

  document.getElementById("plano").innerHTML = `
    <div class="grid">
      ${data.posts.map(p=>`
        <div class="card">
          <b>${p.format}</b><br>
          <strong>${p.theme}</strong>
          <p>${p.caption}</p>
        </div>
      `).join("")}
    </div>
  `;
}

// ===== CONCORRENCIA =====
async function loadConcorrencia(){

  setLoading();

  const data = await post("/api/concorrencia", {
    city:"Linhares"
  });

  render(`
    <h2>Concorrentes</h2>
    ${data.concorrentes.map(c=>card(c.nome + " - " + c.perfil)).join("")}

    <h2>O que fazem bem</h2>
    ${data.o_que_fazem_bem.map(card).join("")}

    <h2>Onde falham</h2>
    ${data.onde_falham.map(card).join("")}

    <h2>Plano para ganhar</h2>
    ${data.plano_para_ganhar.map(card).join("")}
  `);
}

// ===== HELPERS =====
function post(url, extra={}){

  return fetch(url,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      igId:selected.id,
      ...extra
    })
  })
  .then(r=>r.json())
  .catch(()=>{
    alert("Erro na API");
    return {};
  });
}

function render(html){
  document.getElementById("content").innerHTML = html;
}

function setLoading(){
  render("Carregando...");
}

function card(text){
  return `<div class="card">${text}</div>`;
}

</script>

</body>
</html>
