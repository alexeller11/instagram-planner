<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0c0a1a;
  color:#fff;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

select,button{
  padding:10px;
  border-radius:8px;
  border:none;
  margin-right:10px;
}

button{
  background:#ff6b35;
  color:#fff;
  cursor:pointer;
}

.card{
  background:#17142d;
  padding:16px;
  border-radius:12px;
  margin-top:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:12px;
}

.small{
  font-size:13px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h2>Planejador</h2>

<select id="account"></select>

<select id="goal">
<option>Crescimento</option>
<option>Vendas</option>
<option>Engajamento</option>
</select>

<select id="tone">
<option>Profissional</option>
<option>Descontraído</option>
<option>Autoridade</option>
</select>

<button onclick="genPlan()">Gerar Plano</button>

<h3>Posts</h3>
<div id="posts" class="grid"></div>

<h3>Calendário</h3>
<div id="calendar" class="grid"></div>

</div>

<script>

let accounts = [];
let lastPlan = [];

// ================= INIT =================
async function init(){
  const res = await fetch("/api/me");
  const data = await res.json();

  accounts = data.accounts || [];

  const sel = document.getElementById("account");

  accounts.forEach(a=>{
    const opt = document.createElement("option");
    opt.value = a.id;
    opt.innerText = a.username;
    sel.appendChild(opt);
  });
}

init();

// ================= GERAR PLANO =================
async function genPlan(){

  const igId = document.getElementById("account").value;
  const goal = document.getElementById("goal").value;
  const tone = document.getElementById("tone").value;

  document.getElementById("posts").innerHTML = "Gerando...";
  document.getElementById("calendar").innerHTML = "";

  const res = await fetch("/api/generate",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ igId, goal, tone })
  });

  const data = await res.json();

  lastPlan = data.posts || [];

  renderPosts(lastPlan);
  renderCalendar(lastPlan);
}

// ================= RENDER POSTS =================
function renderPosts(posts){

  const el = document.getElementById("posts");
  el.innerHTML = "";

  posts.forEach(p=>{

    const pJson = encodeURIComponent(
      JSON.stringify(p).replace(/'/g, '&apos;').replace(/"/g, '&quot;')
    );

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${p.format}</b><br>
      <strong>${p.theme}</strong>

      <p class="small">${(p.caption || "").substring(0,120)}...</p>

      <button onclick='copyPostContent(JSON.parse(decodeURIComponent("${pJson}")))'>
        Copiar
      </button>

      <button onclick='evaluatePost(JSON.parse(decodeURIComponent("${pJson}")))'>
        Avaliar
      </button>
    `;

    el.appendChild(div);
  });
}

// ================= CALENDÁRIO =================
function renderCalendar(posts){

  const el = document.getElementById("calendar");
  el.innerHTML = "";

  posts.forEach(p=>{

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${p.format}</strong><br>
      ${p.theme}
    `;

    el.appendChild(div);
  });
}

// ================= COPY =================
function copyPostContent(p){

  const text = `
${p.theme}

${p.caption}

${(p.script_or_slides || []).join("\n")}
`;

  navigator.clipboard.writeText(text);

  alert("Copiado!");
}

// ================= AVALIAR =================
function evaluatePost(p){

  let score = 0;

  if(p.caption.length > 100) score += 2;
  if(p.script_or_slides?.length >= 3) score += 2;
  if(!p.caption.toLowerCase().includes("você sabia")) score += 2;

  alert("Score do post: " + score + "/6");
}

</script>

</body>
</html>
