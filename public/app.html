<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Planner</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#06051a;
  color:#fff;
}

/* LAYOUT */
.layout{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#0c0a1a;
  height:100vh;
  padding:20px;
  border-right:1px solid rgba(255,255,255,.05);
}

.sidebar h2{
  font-size:18px;
}

.menu{
  margin-top:20px;
}

.menu div{
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  color:#aaa;
}

.menu div:hover{
  background:#17142d;
  color:#fff;
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* TOP */
.top{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

select,button{
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#ff6b35;
  color:#fff;
  cursor:pointer;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:#17142d;
  padding:16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.05);
}

.tag{
  font-size:11px;
  color:#ff6b35;
}

.title{
  font-weight:bold;
  margin-top:5px;
}

.small{
  font-size:13px;
  color:#aaa;
}

/* CALENDARIO */
.calendar{
  margin-top:20px;
}

</style>
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Planner</h2>

  <div class="menu">
    <div>Dashboard</div>
    <div>Plano Mensal</div>
    <div>Calendário</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Planejamento de Conteúdo</h1>

<div class="top">
  <select id="account"></select>

  <select id="goal">
    <option>Crescimento</option>
    <option>Vendas</option>
    <option>Engajamento</option>
  </select>

  <select id="tone">
    <option>Profissional</option>
    <option>Descontraído</option>
    <option>Autoridade</option>
  </select>

  <button onclick="genPlan()">Gerar Plano</button>
</div>

<h2>Posts</h2>
<div id="posts" class="grid"></div>

<h2 class="calendar">Calendário</h2>
<div id="calendar" class="grid"></div>

</div>
</div>

<script>

let accounts = [];
let lastPlan = [];

// INIT
async function init(){
  const res = await fetch("/api/me");
  const data = await res.json();

  accounts = data.accounts || [];

  const sel = document.getElementById("account");

  accounts.forEach(a=>{
    const opt = document.createElement("option");
    opt.value = a.id;
    opt.innerText = a.username;
    sel.appendChild(opt);
  });
}

init();

// GERAR
async function genPlan(){

  const igId = document.getElementById("account").value;
  const goal = document.getElementById("goal").value;
  const tone = document.getElementById("tone").value;

  document.getElementById("posts").innerHTML = "Gerando...";

  const res = await fetch("/api/generate",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ igId, goal, tone })
  });

  const data = await res.json();

  lastPlan = data.posts || [];

  renderPosts(lastPlan);
  renderCalendar(lastPlan);
}

// POSTS
function renderPosts(posts){

  const el = document.getElementById("posts");
  el.innerHTML = "";

  posts.forEach(p=>{

    const pJson = encodeURIComponent(JSON.stringify(p));

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="tag">${p.format}</div>
      <div class="title">${p.theme}</div>

      <p class="small">${(p.caption || "").substring(0,100)}...</p>

      <button onclick='copyPost(JSON.parse(decodeURIComponent("${pJson}")))'>
        Copiar
      </button>
    `;

    el.appendChild(div);
  });
}

// CALENDARIO
function renderCalendar(posts){

  const el = document.getElementById("calendar");
  el.innerHTML = "";

  posts.forEach(p=>{

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="tag">${p.format}</div>
      <div>${p.theme}</div>
    `;

    el.appendChild(div);
  });
}

// COPY
function copyPost(p){

  const text = `
${p.theme}

${p.caption}

${(p.script_or_slides || []).join("\n")}
`;

  navigator.clipboard.writeText(text);
  alert("Copiado!");
}

</script>

</body>
</html>
