<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Planner Agency</title>
  <style>
    body{margin:0;background:#0c0a1a;color:#fff;font-family:Arial,sans-serif}
    header{padding:16px 20px;background:#17142d;display:flex;justify-content:space-between;align-items:center}
    main{padding:20px;max-width:1100px;margin:0 auto}
    .card{background:#17142d;border-radius:16px;padding:18px;margin-bottom:16px}
    textarea,input{width:100%;padding:12px;border-radius:10px;border:0;margin-top:8px;background:#26223f;color:#fff}
    button{padding:12px 16px;border:0;border-radius:10px;background:#ff6b35;color:#fff;font-weight:700;cursor:pointer;margin-top:12px}
    .list{display:grid;gap:12px;margin-top:16px}
    pre{white-space:pre-wrap;line-height:1.6}
  </style>
</head>
<body>
  <header>
    <strong>Instagram Planner Agency</strong>
    <a href="/" style="color:#fff">Sair</a>
  </header>

  <main>
    <div class="card">
      <h2>Status</h2>
      <button onclick="loadStatus()">Atualizar status</button>
      <pre id="statusBox"></pre>
    </div>

    <div class="card">
      <h2>Concorrência</h2>
      <input id="niche" placeholder="Nicho">
      <input id="location" placeholder="Cidade">
      <textarea id="competitors" rows="6" placeholder="@concorrente1&#10;@concorrente2"></textarea>
      <button onclick="runCompetitors()">Analisar</button>
      <div class="list" id="result"></div>
    </div>
  </main>

  <script>
    let accounts = [];
    let csrfToken = "";

    function escapeText(value){
      return String(value ?? "");
    }

    async function ensureCsrfToken(){
      if (csrfToken) return csrfToken;
      const data = await fetch("/api/csrf-token", { credentials:"include" }).then(r => r.json());
      csrfToken = data.csrfToken || "";
      return csrfToken;
    }

    async function apiFetch(url, options = {}){
      const token = await ensureCsrfToken();
      const headers = { ...(options.headers || {}) };
      if (options.method && options.method !== "GET") {
        headers["x-csrf-token"] = token;
      }
      return fetch(url, { credentials:"include", ...options, headers });
    }

    async function init(){
      const me = await fetch("/api/me", { credentials:"include" }).then(r => r.json());
      if(!me.logged){
        window.location.href = "/";
        return;
      }
      accounts = me.accounts || [];
      await ensureCsrfToken();
      loadStatus();
    }

    async function loadStatus(){
      const data = await apiFetch("/api/status").then(r => r.json());
      document.getElementById("statusBox").textContent = JSON.stringify(data, null, 2);
    }

    async function runCompetitors(){
      const current = accounts[0];
      const competitors = document.getElementById("competitors").value
        .split("\n")
        .map(v => v.trim())
        .filter(Boolean);

      const payload = {
        igId: current?.id,
        niche: document.getElementById("niche").value,
        audience: "",
        competitors,
        location: document.getElementById("location").value,
        goal: "",
        tone: "",
        extra: ""
      };

      const res = await apiFetch("/api/competitors", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      const box = document.getElementById("result");
      box.textContent = "";

      (data.competitors_analysis || []).forEach((c) => {
        const card = document.createElement("div");
        card.className = "card";

        const h3 = document.createElement("h3");
        h3.textContent = escapeText(c.username || "");
        card.appendChild(h3);

        const fields = [
          ["Score", c.score || 0],
          ["Ameaça", c.threat_level || "-"],
          ["Confiança", c.data_confidence || "-"],
          ["Evidência", c.evidence_summary || "-"]
        ];

        fields.forEach(([label, val]) => {
          const div = document.createElement("div");
          const strong = document.createElement("strong");
          strong.textContent = `${label}: `;
          div.appendChild(strong);
          div.appendChild(document.createTextNode(escapeText(val)));
          card.appendChild(div);
        });

        const pre = document.createElement("pre");
        pre.textContent = escapeText(c.opportunity_against || "");
        card.appendChild(pre);

        box.appendChild(card);
      });
    }

    init();
  </script>
</body>
</html>
