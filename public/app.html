<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Agency</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#02030f;
  color:#fff;
}

.layout{ display:flex; }

.sidebar{
  width:260px;
  background:#06051a;
  height:100vh;
  padding:25px;
}

.menu div{
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  color:#aaa;
}

.menu div.active{
  background:#1bd1b3;
  color:#000;
}

.main{
  flex:1;
  padding:30px;
}

.top{
  margin-bottom:20px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ff6b35;
  color:#fff;
  cursor:pointer;
}

.card{
  background:#0c0b24;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:10px;
}
</style>
</head>

<body>

<div class="layout">

<div class="sidebar">
  <h2>Planner</h2>

  <div class="menu">
    <div onclick="openTab('dashboard')" id="tab-dashboard">Dashboard</div>
    <div onclick="openTab('diagnostico')" id="tab-diagnostico">Diagnóstico</div>
    <div onclick="openTab('plano')" id="tab-plano">Plano</div>
    <div onclick="openTab('concorrencia')" id="tab-concorrencia">Concorrência</div>
  </div>
</div>

<div class="main">

<div class="top">
  <select id="account"></select>
</div>

<div id="content"></div>

</div>
</div>

<script>

let accounts = [];
let selected = null;

async function init(){
  const res = await fetch("/api/me");
  const data = await res.json();

  accounts = data.accounts;
  selected = accounts[0];

  const sel = document.getElementById("account");

  accounts.forEach(a=>{
    const opt = document.createElement("option");
    opt.value = a.id;
    opt.innerText = a.username;
    sel.appendChild(opt);
  });

  sel.onchange = ()=>{
    selected = accounts.find(a=>a.id===sel.value);
  }

  openTab("dashboard");
}

init();

// ===== NAV =====
function openTab(tab){

  document.querySelectorAll(".menu div").forEach(el=>el.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");

  if(tab==="dashboard") loadDashboard();
  if(tab==="diagnostico") loadDiagnostico();
  if(tab==="plano") loadPlano();
  if(tab==="concorrencia") loadConcorrencia();
}

// ===== DASHBOARD =====
async function loadDashboard(){

  document.getElementById("content").innerHTML = "Carregando...";

  const res = await fetch("/api/dashboard",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ igId:selected.id })
  });

  const data = await res.json();

  document.getElementById("content").innerHTML = `
    <h2>Bio</h2>
    ${data.bio.map(b=>`<div class="card">${b}</div>`).join("")}

    <h2>Melhorias</h2>
    ${data.melhorias.map(m=>`<div class="card">${m}</div>`).join("")}

    <h2>Resumo</h2>
    <div class="card">${data.resumo}</div>
  `;
}

// ===== DIAGNOSTICO =====
async function loadDiagnostico(){

  document.getElementById("content").innerHTML = "Carregando...";

  const res = await fetch("/api/diagnostico",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ igId:selected.id })
  });

  const data = await res.json();

  document.getElementById("content").innerHTML = `
    <h2>Problemas</h2>
    ${data.problemas.map(p=>`<div class="card">${p}</div>`).join("")}

    <h2>Oportunidades</h2>
    ${data.oportunidades.map(o=>`<div class="card">${o}</div>`).join("")}

    <h2>Sugestões</h2>
    ${data.sugestoes.map(s=>`<div class="card">${s}</div>`).join("")}
  `;
}

// ===== PLANO =====
async function loadPlano(){

  document.getElementById("content").innerHTML = `
    <button onclick="gerarPlano()">Gerar Plano</button>
    <div id="plano"></div>
  `;
}

async function gerarPlano(){

  document.getElementById("plano").innerHTML = "Gerando...";

  const res = await fetch("/api/plano",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      igId:selected.id,
      goal:"Crescimento"
    })
  });

  const data = await res.json();

  document.getElementById("plano").innerHTML = `
    <div class="grid">
      ${data.posts.map(p=>`
        <div class="card">
          <b>${p.format}</b><br>
          ${p.theme}
          <p>${p.caption}</p>
        </div>
      `).join("")}
    </div>
  `;
}

// ===== CONCORRENCIA =====
async function loadConcorrencia(){

  document.getElementById("content").innerHTML = "Carregando...";

  const res = await fetch("/api/concorrencia",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      igId:selected.id,
      cidade:"Linhares"
    })
  });

  const data = await res.json();

  document.getElementById("content").innerHTML = `
    <h2>Concorrentes</h2>
    ${data.concorrentes.map(c=>`<div class="card">${c}</div>`).join("")}

    <h2>Estratégia</h2>
    <div class="card">${data.estrategia}</div>

    <h2>Oportunidades</h2>
    ${data.oportunidades.map(o=>`<div class="card">${o}</div>`).join("")}
  `;
}

</script>

</body>
</html>
