<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Social Planner Pro v4.5 AI — Agência Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#ff6b35;
  --brand2:#ffd166;
  --bg:#0c0a1a;
  --surface:#13112a;
  --card:#1c1a35;
  --border:rgba(255,255,255,.08);
  --text:#fff;
  --muted:rgba(255,255,255,.55);
  --subtle:rgba(255,255,255,.25)
}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden
}
.app-shell{
  display:grid;
  grid-template-columns:220px minmax(0,1fr);
  min-height:100vh;
}
.sidebar{
  background:#0b0915;
  border-right:.5px solid var(--border);
  padding:1rem 1rem .75rem;
  display:flex;
  flex-direction:column;
  gap:1.5rem;
  position: sticky;
  top: 0;
  height: 100vh;
}
.sidebar-logo{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:.95rem;
  color:#fff;
}
.sidebar-version{
  display:inline-block;
  margin-left:6px;
  font-size:10px;
  padding:2px 8px;
  border-radius:999px;
  background:rgba(255,107,53,.12);
  color:#ffb38a;
}
.sidebar-nav{
  display:flex;
  flex-direction:column;
  gap:.4rem;
}
.nav-item{
  text-align:left;
  padding:.55rem .7rem;
  border-radius:8px;
  border:none;
  background:transparent;
  color:var(--muted);
  font-size:.8rem;
  cursor:pointer;
  transition:background .2s,color .2s;
}
.nav-item.on{
  background:rgba(255,107,53,.15);
  color:var(--brand);
}
.main{
  display:flex;
  flex-direction:column;
  min-height:100vh;
}
.topbar{
  padding:.9rem 1.4rem;
  border-bottom:.5px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:1rem;
  background: rgba(12, 10, 26, 0.8);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title{
  font-family:'Syne',sans-serif;
  font-size:1rem;
  font-weight:700;
}
.topbar-sub{
  font-size:.75rem;
  color:var(--muted);
}
.topbar-accounts{
  display:flex;
  gap:.5rem;
  max-width:320px;
  overflow-x:auto;
}
.main-content{
  padding:1.25rem 1.4rem 2rem;
  max-width:1040px;
}
.page{display:none;max-width:960px;margin:0 auto}
.page.on{display:block}
.card{
  background:var(--card);
  border:.5px solid var(--border);
  border-radius:14px;
  padding:1.25rem;
  margin-bottom:1rem
}
.card-title{
  font-family:'Syne',sans-serif;
  font-size:.9rem;
  font-weight:700;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  gap:8px
}
.cicon{
  width:26px;height:26px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  flex-shrink:0
}
.metrics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:.75rem;
  margin-bottom:1rem
}
.metric-card{
  background:var(--surface);
  border:.5px solid var(--border);
  border-radius:12px;
  padding:.9rem;
  text-align:center
}
.metric-card .mv{
  font-family:'Syne',sans-serif;
  font-size:1.4rem;
  font-weight:700
}
.metric-card .ml{
  font-size:11px;
  color:var(--muted);
  margin-top:3px
}
.chart-wrap{
  position:relative;
  height:180px;
  margin:1rem 0
}
.flabel{
  font-size:11px;
  font-weight:500;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.04em;
  margin-bottom:4px;
  display:block
}
.fgroup{margin-bottom:.85rem;position:relative}
input,select,textarea{
  width:100%;
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  background:rgba(255,255,255,0.05);
  border:.5px solid var(--border);
  border-radius:10px;
  padding:9px 12px;
  color:var(--text);
  outline:none;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(255,107,53,0.1)
}
.mix-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:.75rem;
  margin:.75rem 0
}
.mix-item{
  background:var(--surface);
  border-radius:12px;
  padding:.75rem;
  text-align:center
}
.mix-label{
  font-size:11px;
  color:var(--muted);
  margin-bottom:.4rem
}
.mix-val{
  font-family:'Syne',sans-serif;
  font-size:1.3rem;
  font-weight:700
}
.mix-btns{
  display:flex;
  justify-content:center;
  gap:.5rem;
  margin-top:.5rem
}
.mix-btn{
  width:26px;
  height:26px;
  border-radius:50%;
  border:.5px solid var(--border);
  background:rgba(255,255,255,.05);
  color:var(--text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
}
.acc-chip{
  background:rgba(255,255,255,.05);
  border:.5px solid var(--border);
  border-radius:20px;
  padding:5px 12px;
  font-size:12px;
  cursor:pointer;
  white-space:nowrap
}
.acc-chip.on{
  background:rgba(255,107,53,.15);
  border-color:rgba(255,107,53,.5);
  color: var(--brand);
}
.gen-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#ff6b35,#f7931e);
  color:#fff;
  border:none;
  border-radius:12px;
  font-family:'Syne',sans-serif;
  font-size:.95rem;
  font-weight:700;
  cursor:pointer;
}
.gen-btn:disabled{opacity:.4;cursor:not-allowed}

/* Calendário e Posts */
#cal-container{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
  margin-top:1rem
}
.cal-day{
  background:rgba(255,255,255,.03);
  border:.5px solid var(--border);
  aspect-ratio:1;
  border-radius:6px;
  padding:4px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor: pointer;
}
.cal-day:hover { background: rgba(255,255,255,0.08); }
.cal-day .dn{ font-size:9px; font-weight:700; color:var(--subtle); position:absolute; top:3px; left:4px }
.dot-row{ display:flex; gap:2px; margin-top:8px }
.dot{ width:6px; height:6px; border-radius:50% }
.dot.reels { background: #ff6b35; }
.dot.carrossel { background: #378add; }
.dot.foto { background: #639922; }

.post-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem;
  margin-bottom: 1rem;
}
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.badge-reels { background: rgba(255,107,53,0.2); color: #ff6b35; }
.badge-carrossel { background: rgba(55,138,221,0.2); color: #378add; }
.badge-foto { background: rgba(99,153,34,0.2); color: #639922; }

#toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,.95);
  color:#000;
  padding:10px 20px;
  border-radius:40px;
  font-size:12px;
  font-weight:600;
  z-index:2000;
  display:none;
}

.ld-wrap{ display:none; text-align:center; padding:2rem }
.ld-ring{ width:32px; height:32px; border-radius:50%; border:3px solid rgba(255,107,53,.15); border-top-color:var(--brand); animation:spin 1s linear infinite; margin:0 auto 1rem }
@keyframes spin{to{transform:rotate(360deg)}}

.analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
.mini-card { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
.mini-card h4 { font-size: 11px; color: var(--brand); text-transform: uppercase; margin-bottom: 5px; }
.mini-card p { font-size: 12px; line-height: 1.4; }

@media (max-width:860px){
  .app-shell{ grid-template-columns:1fr; }
  .sidebar{ position: relative; height: auto; flex-direction: row; }
  .analysis-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      ✦ Social Planner Pro
      <span class="sidebar-version">v4.5 AI</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item on" data-page="dashboard">Dashboard</button>
      <button class="nav-item" data-page="intelligence">Inteligência</button>
      <button class="nav-item" data-page="planner">Planejador</button>
      <button class="nav-item" data-page="competitors">Concorrência</button>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title" id="page-title">Dashboard Estratégico</div>
        <div class="topbar-sub" id="page-sub">Métricas e performance da conta</div>
      </div>
      <div class="topbar-accounts" id="acc-list"></div>
    </header>

    <main class="main-content">
      <!-- Dashboard -->
      <div id="dashboard" class="page on">
        <div class="card">
          <div class="card-title"><div class="cicon" style="background:rgba(255,107,53,.15);color:#ff6b35">📊</div> Métricas Reais</div>
          <div class="metrics-grid">
            <div class="metric-card"><div class="mv" id="m-alcance">-</div><div class="ml">Alcance</div></div>
            <div class="metric-card"><div class="mv" id="m-engajamento">-</div><div class="ml">Engajamento</div></div>
            <div class="metric-card"><div class="mv" id="m-taxa">-%</div><div class="ml">Taxa Média</div></div>
          </div>
          <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
        </div>
        <div id="dash-analysis"></div>
      </div>

      <!-- Inteligência -->
      <div id="intelligence" class="page">
        <div class="card">
          <div class="card-title"><div class="cicon" style="background:rgba(186,117,23,.15);color:#ba7517">🧠</div> Diagnóstico da Agência</div>
          <button class="gen-btn" id="btn-diag" onclick="runDiagnostic()">Gerar Diagnóstico 360º</button>
        </div>
        <div id="diag-result"></div>
      </div>

      <!-- Planejador -->
      <div id="planner" class="page">
        <div class="card">
          <div class="card-title"><div class="cicon" style="background:rgba(99,153,34,.15);color:#639922">🚀</div> Planejamento Mensal</div>
          <div class="mix-row">
            <div class="mix-item"><div class="mix-label">Reels</div><div class="mix-val" id="v-reels">8</div>
              <div class="mix-btns"><button class="mix-btn" onclick="updMix('reels',-1)">-</button><button class="mix-btn" onclick="updMix('reels',1)">+</button></div>
            </div>
            <div class="mix-item"><div class="mix-label">Carrossel</div><div class="mix-val" id="v-car">6</div>
              <div class="mix-btns"><button class="mix-btn" onclick="updMix('car',-1)">-</button><button class="mix-btn" onclick="updMix('car',1)">+</button></div>
            </div>
            <div class="mix-item"><div class="mix-label">Foto</div><div class="mix-val" id="v-foto">2</div>
              <div class="mix-btns"><button class="mix-btn" onclick="updMix('foto',-1)">-</button><button class="mix-btn" onclick="updMix('foto',1)">+</button></div>
            </div>
          </div>
          <button class="gen-btn" id="btn-plan" onclick="generatePlan()">Gerar Cronograma de Conteúdo</button>
          <div class="ld-wrap" id="plan-loader"><div class="ld-ring"></div><div class="ld-msg">A IA está criando sua estratégia...</div></div>
        </div>
        <div id="plan-result"></div>
      </div>

      <!-- Concorrência -->
      <div id="competitors" class="page">
        <div class="card">
          <div class="card-title"><div class="cicon" style="background:rgba(55,138,221,.15);color:#378add">🔍</div> Análise de Mercado</div>
          <button class="gen-btn" onclick="runCompetitors()">Mapear Concorrentes e Oportunidades</button>
        </div>
        <div id="comp-result"></div>
      </div>
    </main>
  </div>
</div>

<div id="toast"></div>

<script>
let accounts = [], selAccount = null, mix = { reels:8, car:6, foto:2 }, chart = null;

const init = async () => {
  const r = await fetch('/api/me');
  const d = await r.json();
  accounts = d.accounts || [];
  renderAccounts();
  
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
      document.getElementById(btn.dataset.page).classList.add('on');
      document.getElementById('page-title').textContent = btn.textContent;
    };
  });
};

function renderAccounts() {
  const l = document.getElementById('acc-list');
  l.innerHTML = accounts.map(a => 
    `<div class="acc-chip ${selAccount?.id===a.id ? 'on' : ''}" onclick="selectAcc('${a.id}')">@${a.username}</div>`
  ).join('');
  if (!selAccount && accounts.length) selectAcc(accounts[0].id);
}

async function selectAcc(id) {
  selAccount = accounts.find(a => a.id === id);
  renderAccounts();
  loadDashboard();
}

function updMix(k, v) {
  mix[k] = Math.max(0, mix[k] + v);
  document.getElementById('v-' + k).textContent = mix[k];
}

async function loadDashboard() {
  const r = await fetch('/api/dashboard', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ igId: selAccount.id })
  });
  const data = await r.json();
  
  document.getElementById('m-alcance').textContent = data.metrics.summary.alcance.toLocaleString();
  document.getElementById('m-engajamento').textContent = data.metrics.summary.engajamentos.toLocaleString();
  document.getElementById('m-taxa').textContent = data.metrics.summary.taxa_engajamento_media + '%';
  
  renderChart(data.metrics.top_contents);
  
  document.getElementById('dash-analysis').innerHTML = `
    <div class="card">
      <div class="card-title">✨ Sugestões de BIO</div>
      ${data.profile.bio.map(b => `<div class="mini-card" style="margin-bottom:8px">${b}</div>`).join('')}
    </div>
    <div class="analysis-grid">
      <div class="card"><h4>Posicionamento</h4><p>${data.profile.posicionamento}</p></div>
      <div class="card"><h4>Melhorias</h4><ul>${data.profile.melhorias.map(m => `<li>${m}</li>`).join('')}</ul></div>
    </div>
  `;
}

function renderChart(posts) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: posts.map(p => p.date).reverse(),
      datasets: [{
        label: 'Engajamento',
        data: posts.map(p => p.engajamentos).reverse(),
        borderColor: '#ff6b35',
        tension: 0.4,
        fill: true,
        backgroundColor: 'rgba(255,107,53,0.1)'
      }]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

async function runDiagnostic() {
  const btn = document.getElementById('btn-diag');
  btn.disabled = true;
  const r = await fetch('/api/diagnostico', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ igId: selAccount.id })
  });
  const data = await r.json();
  document.getElementById('diag-result').innerHTML = `
    <div class="analysis-grid">
      <div class="card"><h4>Problemas</h4><ul>${data.problemas.map(p => `<li>${p}</li>`).join('')}</ul></div>
      <div class="card"><h4>Oportunidades</h4><ul>${data.oportunidades.map(o => `<li>${o}</li>`).join('')}</ul></div>
    </div>
    <div class="card"><h4>Ações para os próximos 14 dias</h4><div class="analysis-grid">${data.acoes_14_dias.map(a => `<div class="mini-card">${a}</div>`).join('')}</div></div>
  `;
  btn.disabled = false;
}

async function generatePlan() {
  const loader = document.getElementById('plan-loader');
  const result = document.getElementById('plan-result');
  loader.style.display = 'block';
  result.innerHTML = '';
  
  const r = await fetch('/api/plano', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ 
      igId: selAccount.id,
      qtyReels: mix.reels,
      qtyCarrossel: mix.car,
      qtyFoto: mix.foto
    })
  });
  const data = await r.json();
  
  loader.style.display = 'none';
  result.innerHTML = `
    <div class="card">
      <div id="cal-container">
        ${data.posts.map((p, i) => `
          <div class="cal-day" title="${p.theme}">
            <span class="dn">${i+1}</span>
            <div class="dot ${p.format.toLowerCase()}"></div>
          </div>
        `).join('')}
      </div>
    </div>
    <div id="posts-list">
      ${data.posts.map(p => `
        <div class="post-card">
          <span class="badge badge-${p.format.toLowerCase()}">${p.format}</span>
          <h3 style="font-size:14px;margin-bottom:8px">${p.theme}</h3>
          <p style="font-size:12px;color:var(--muted);margin-bottom:10px"><strong>Gancho:</strong> ${p.hook}</p>
          <div class="mini-card" style="font-size:11px;background:rgba(0,0,0,0.2)">${p.caption}</div>
        </div>
      `).join('')}
    </div>
  `;
}

async function runCompetitors() {
  const r = await fetch('/api/concorrencia', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ igId: selAccount.id })
  });
  const data = await r.json();
  document.getElementById('comp-result').innerHTML = `
    <div class="analysis-grid">
      ${data.concorrentes.map(c => `
        <div class="card">
          <h4 style="color:var(--brand)">${c.nome} (@${c.perfil})</h4>
          <p style="font-size:12px;margin:8px 0"><strong>Posicionamento:</strong> ${c.positioning}</p>
          <div class="mini-card" style="border-color:var(--brand2)"><strong>Oportunidade:</strong> ${c.opportunity}</div>
        </div>
      `).join('')}
    </div>
    <div class="card"><h4>Plano para Ganhar Espaço</h4><ul>${data.plano_para_ganhar.map(p => `<li>${p}</li>`).join('')}</ul></div>
  `;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

init();
</script>
</body>
</html>
