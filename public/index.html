<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Login Planner</title>
<style>
body {
  font-family: Arial;
  background:#0c0a1a;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.box {
  background:#13112a;
  padding:30px;
  border-radius:12px;
}
button {
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#ff6b35;
  color:#fff;
}
</style>
</head>

<body>
<div class="box">
  <h2>Entrar</h2>
  <button onclick="login()">Conectar contas</button>
</div>

<script>
async function login(){
  const res = await fetch("/api/auth",{method:"POST"});
  const data = await res.json();
  if(data.success){
    window.location="/app";
  } else {
    alert("Erro ao logar");
  }
}
</script>
</body>
</html>
