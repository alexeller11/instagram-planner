<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Planner</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0c0a1a;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
    }

    .box{
      background:#17142d;
      padding:30px;
      border-radius:16px;
      text-align:center;
      width:320px;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#ff6b35;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }

    p{color:#bbb}
  </style>
</head>

<body>

<div class="box">
  <h2>Instagram Planner</h2>
  <p>Acesse seu painel</p>

  <button onclick="go()">Entrar</button>
</div>

<script>
function go(){
  window.location.href = "/app";
}
</script>

</body>
</html>
