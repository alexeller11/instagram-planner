services:
  - type: web
    name: instagram-marketing-planner
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FB_APP_ID
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: NODE_ENV
        value: production
