services:
  - type: web
    name: instagram-planner-agency
    runtime: docker
    plan: starter
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: IG_TOKENS
        sync: false
